{% extends "base.html" %}

{% block title %}News - Options Tracker{% endblock %}

{% block content %}
<div id="news-page" class="news-container">
    <div class="page-header">
        <h1>News</h1>
        <p>Recent market news and event-risk updates.</p>
    </div>

    <section class="dashboard-section">
        <h2>Recent News</h2>
        <div id="news-container" class="news-list">
            <div class="empty-state">
                <p class="empty-state-text">Loading news...</p>
            </div>
        </div>
    </section>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/news.js"></script>
{% endblock %}
