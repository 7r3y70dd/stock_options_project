version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: stock_options_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stock_options
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stock_options_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: stock_options_app
    command: uvicorn app.core.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      APP_ENV: dev
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql://user:password@postgres:5432/stock_options
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FRONTEND_API_BASE_URL: http://localhost:8000
      FRONTEND_DASHBOARD_PREFIX: /api/api/dashboard
      DEMO_USER_ID: 1
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build: .
    container_name: stock_options_celery_worker
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql://user:password@postgres:5432/stock_options
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      LOG_LEVEL: INFO
    depends_on:
      - postgres
      - redis
      - app
    volumes:
      - .:/app

  celery_beat:
    build: .
    container_name: stock_options_celery_beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql://user:password@postgres:5432/stock_options
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      LOG_LEVEL: INFO
    depends_on:
      - postgres
      - redis
      - app
    volumes:
      - .:/app

volumes:
  postgres_data:
