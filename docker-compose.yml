services:
  postgres:
    image: postgres:15-alpine
    container_name: options_tracker_postgres
    environment:
      POSTGRES_USER: options_user
      POSTGRES_PASSWORD: options_password
      POSTGRES_DB: options_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U options_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: options_tracker_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: options_tracker_app
    command: uvicorn app.core.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: dev
      DEBUG: "True"
      DATABASE_URL: postgresql://options_user:options_password@postgres:5432/options_tracker
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATA_PROVIDER: mock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - options_network

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: options_tracker_celery_worker
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      ENVIRONMENT: dev
      DEBUG: "True"
      DATABASE_URL: postgresql://options_user:options_password@postgres:5432/options_tracker
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATA_PROVIDER: mock
    depends_on:
      - postgres
      - redis
      - app
    volumes:
      - .:/app
    networks:
      - options_network

volumes:
  postgres_data:

networks:
  options_network:
    driver: bridge
