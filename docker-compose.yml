version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: options-tracker
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./options_tracker.db
      - DEBUG=False
      - LOG_LEVEL=INFO
    volumes:
      - .:/app
      - /app/__pycache__
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - options-network

networks:
  options-network:
    driver: bridge
